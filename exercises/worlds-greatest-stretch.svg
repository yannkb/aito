<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Person in lunge with rotation: front foot forward, back leg straight, one arm reaching up -->
  <!-- Head -->
  <circle cx="48" cy="26" r="8" />
  <!-- Torso leaned forward over front leg -->
  <line x1="48" y1="34" x2="50" y2="60" />
  <!-- Left arm: hand on ground inside front foot -->
  <line x1="50" y1="44" x2="36" y2="72" />
  <!-- Right arm: reaching toward sky (rotation) -->
  <line x1="50" y1="44" x2="62" y2="18" />
  <!-- Front leg: deep lunge -->
  <line x1="50" y1="60" x2="36" y2="76" />
  <line x1="36" y1="76" x2="34" y2="92" />
  <line x1="29" y1="92" x2="39" y2="92" />
  <!-- Back leg: extended straight -->
  <line x1="50" y1="60" x2="90" y2="80" />
  <line x1="90" y1="80" x2="96" y2="92" />
  <!-- Ground line -->
  <line x1="15" y1="96" x2="105" y2="96" stroke-dasharray="4 3" opacity="0.3" />
  <!-- Rotation arrow near raised hand -->
  <path d="M 66 24 Q 68 16 64 12" opacity="0.5" />
  <polyline points="62 15 64 12 67 14" opacity="0.5" />
</svg>
