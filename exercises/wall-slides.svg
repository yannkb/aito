<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Person standing with back against wall, arms sliding up -->
  <!-- Wall -->
  <line x1="85" y1="10" x2="85" y2="100" stroke-dasharray="4 3" opacity="0.3" />
  <!-- Head -->
  <circle cx="68" cy="22" r="8" />
  <!-- Torso against wall -->
  <line x1="68" y1="30" x2="68" y2="62" />
  <!-- Arms: "W" position sliding up against wall -->
  <!-- Left arm up -->
  <line x1="68" y1="38" x2="56" y2="32" />
  <line x1="56" y1="32" x2="56" y2="16" />
  <!-- Right arm up (ghost/target position) -->
  <line x1="68" y1="38" x2="56" y2="44" opacity="0.35" stroke-dasharray="3 3" />
  <line x1="56" y1="44" x2="56" y2="54" opacity="0.35" stroke-dasharray="3 3" />
  <!-- Slide arrow -->
  <line x1="50" y1="50" x2="50" y2="20" opacity="0.4" />
  <polyline points="47 24 50 20 53 24" opacity="0.4" />
  <!-- Legs -->
  <line x1="68" y1="62" x2="62" y2="90" />
  <line x1="68" y1="62" x2="74" y2="90" />
  <!-- Feet -->
  <line x1="57" y1="90" x2="65" y2="90" />
  <line x1="71" y1="90" x2="79" y2="90" />
  <!-- Ground line -->
  <line x1="20" y1="96" x2="100" y2="96" stroke-dasharray="4 3" opacity="0.3" />
</svg>
