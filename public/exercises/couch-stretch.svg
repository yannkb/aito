<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Person in couch stretch: one knee on ground near wall, other foot forward -->
  <!-- Head -->
  <circle cx="55" cy="22" r="8" />
  <!-- Torso upright -->
  <line x1="55" y1="30" x2="55" y2="58" />
  <!-- Arms on front knee -->
  <line x1="55" y1="40" x2="40" y2="52" />
  <line x1="55" y1="40" x2="70" y2="52" />
  <!-- Front leg: foot flat, knee bent at 90 -->
  <line x1="55" y1="58" x2="35" y2="68" />
  <line x1="35" y1="68" x2="35" y2="92" />
  <line x1="30" y1="92" x2="40" y2="92" />
  <!-- Back leg: knee down, shin up against wall -->
  <line x1="55" y1="58" x2="75" y2="75" />
  <line x1="75" y1="75" x2="90" y2="60" />
  <!-- Ground line -->
  <line x1="15" y1="96" x2="90" y2="96" stroke-dasharray="4 3" opacity="0.3" />
  <!-- Wall -->
  <line x1="92" y1="20" x2="92" y2="96" stroke-dasharray="4 3" opacity="0.3" />
  <!-- Knee on ground -->
  <circle cx="75" cy="75" r="2" fill="currentColor" />
</svg>
