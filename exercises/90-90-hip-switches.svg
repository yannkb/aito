<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Person sitting with legs in 90/90 position -->
  <!-- Head -->
  <circle cx="60" cy="24" r="8" />
  <!-- Torso -->
  <line x1="60" y1="32" x2="60" y2="62" />
  <!-- Arms resting on ground -->
  <line x1="60" y1="42" x2="40" y2="56" />
  <line x1="60" y1="42" x2="80" y2="56" />
  <!-- Front leg: thigh forward, shin to side (90 degrees) -->
  <line x1="60" y1="62" x2="40" y2="72" />
  <line x1="40" y1="72" x2="40" y2="92" />
  <!-- Back leg: thigh to side, shin back (90 degrees) -->
  <line x1="60" y1="62" x2="80" y2="72" />
  <line x1="80" y1="72" x2="100" y2="72" />
  <!-- Ground line -->
  <line x1="15" y1="96" x2="105" y2="96" stroke-dasharray="4 3" opacity="0.3" />
  <!-- Rotation arrow -->
  <path d="M 45 105 Q 60 100 75 105" />
  <polyline points="72 101 75 105 71 108" />
</svg>
